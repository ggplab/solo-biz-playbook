<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chart 04 — 업무 카테고리 funnel</title>
  <style>
    :root {
      --paper: #faf7f2;
      --paper-2: #f2ede4;
      --ink: #1c1917;
      --muted: #6f6a60;
      --soft: #9a9286;
      --rule: rgba(28,25,23,0.18);
      --accent: #b5523a;
      --accent-tint: rgba(181,82,58,0.10);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--paper);
      color: var(--ink);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .frame {
      width: 1200px;
      height: 900px;
      background:
        radial-gradient(circle at 1px 1px, rgba(28,25,23,0.10) 1px, transparent 0) 0 0 / 22px 22px,
        var(--paper);
      padding: 56px 64px;
    }
    h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 42px;
      font-weight: 400;
      letter-spacing: 0;
    }
    .subtitle {
      margin: 10px 0 28px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.5;
    }
    svg {
      display: block;
      width: 100%;
      height: 680px;
    }
    .eyebrow {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      fill: var(--soft);
    }
    .label {
      font-size: 20px;
      font-weight: 700;
      fill: var(--ink);
    }
    .sub {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 14px;
      fill: var(--muted);
    }
    .side {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
      fill: var(--muted);
    }
    .callout {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 17px;
      font-style: italic;
      fill: var(--accent);
    }
  </style>
</head>
<body>
  <main class="frame" aria-label="Chart 04 업무 카테고리 funnel">
    <h1>Chart 04 — 업무 카테고리 funnel</h1>
    <p class="subtitle">Claude Monthly Review 2026-04 공개판. 프로젝트명과 고객명은 제거하고, 업무 카테고리별 토큰 비중만 남겼습니다.</p>

    <svg viewBox="0 0 1072 680" role="img" aria-labelledby="title desc">
      <title id="title">업무 카테고리별 토큰 비중 funnel</title>
      <desc id="desc">인프라 도구 일반작업 44.4%, 교육 멘토링 16.9%, 홈페이지 전환 14.7%, 자동화 콘텐츠 14.3%, 콘텐츠 SNS 5.5%, 도서 리서치 4.2% 순서의 funnel 차트</desc>

      <rect x="0" y="0" width="1072" height="680" rx="8" fill="rgba(242,237,228,0.70)" stroke="rgba(28,25,23,0.10)"/>
      <text x="64" y="56" class="eyebrow">ANONYMIZED TOKEN SHARE · KST 2026-04-02 TO 2026-05-01</text>

      <line x1="116" y1="122" x2="116" y2="556" stroke="#9a9286" stroke-width="1"/>
      <path d="M116 556 l-5 -10 h10z" fill="#9a9286"/>
      <text x="92" y="346" class="eyebrow" transform="rotate(-90 92 346)">smaller share ↓</text>

      <polygon points="252,106 820,106 762,176 310,176" fill="var(--accent-tint)" stroke="var(--accent)" stroke-width="1.5"/>
      <text x="536" y="136" text-anchor="middle" class="label">인프라·도구·일반작업</text>
      <text x="536" y="158" text-anchor="middle" class="sub">911M tokens · 44.4%</text>
      <text x="848" y="146" class="side">미분류·공통 작업 비중</text>

      <polygon points="328,184 744,184 705,254 367,254" fill="#ffffff" stroke="var(--rule)" stroke-width="1"/>
      <text x="536" y="214" text-anchor="middle" class="label">교육·멘토링</text>
      <text x="536" y="236" text-anchor="middle" class="sub">346M · 16.9%</text>
      <text x="772" y="224" class="side">수익 직결 라인</text>

      <polygon points="356,262 716,262 684,332 388,332" fill="#ffffff" stroke="var(--rule)" stroke-width="1"/>
      <text x="536" y="292" text-anchor="middle" class="label">홈페이지 전환</text>
      <text x="536" y="314" text-anchor="middle" class="sub">303M · 14.7%</text>
      <text x="744" y="302" class="side">전환 자산 구축</text>

      <polygon points="360,340 712,340 681,410 391,410" fill="#ffffff" stroke="var(--rule)" stroke-width="1"/>
      <text x="536" y="370" text-anchor="middle" class="label">자동화 콘텐츠</text>
      <text x="536" y="392" text-anchor="middle" class="sub">293M · 14.3%</text>
      <text x="740" y="380" class="side">콘텐츠 생산 시스템</text>

      <polygon points="438,418 634,418 618,488 454,488" fill="#ffffff" stroke="var(--rule)" stroke-width="1"/>
      <text x="536" y="448" text-anchor="middle" class="label">콘텐츠·SNS</text>
      <text x="536" y="470" text-anchor="middle" class="sub">114M · 5.5%</text>
      <text x="662" y="458" class="side">실행 채널</text>

      <polygon points="452,496 620,496 606,566 466,566" fill="#ffffff" stroke="var(--rule)" stroke-width="1"/>
      <text x="536" y="526" text-anchor="middle" class="label">도서·리서치</text>
      <text x="536" y="548" text-anchor="middle" class="sub">86M · 4.2%</text>
      <text x="648" y="536" class="side">후반 집중 작업</text>

      <path d="M824 170 C910 228, 902 330, 772 386" fill="none" stroke="var(--accent)" stroke-width="1.2" stroke-dasharray="5 5"/>
      <rect x="746" y="438" width="282" height="78" rx="6" fill="var(--paper)" stroke="rgba(181,82,58,0.22)"/>
      <text x="766" y="466" class="callout">수익 직결 라인 = 45.9%</text>
      <text x="766" y="492" class="side">교육·홈페이지·자동화 콘텐츠 합산</text>

      <text x="64" y="628" class="side">Source: examples/monthly-claude-review/2026-04-anonymized.md · labels generalized for public release</text>
    </svg>
  </main>
</body>
</html>
